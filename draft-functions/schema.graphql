type DraftPick {
  teamId: String!
  playerId: String!
  roundNumber: Int!
  pickNumber: Int!
  leagueId: String!
  timestamp: String!
}

type DraftPickResult {
  pick: DraftPick!
  nextTeamId: String
  nextPickExpiresAt: String
}

type DraftState {
  leagueId: String!
  picks: [DraftPick!]!
  currentTeamId: String
  currentRound: Int!
  currentPick: Int!
  pickExpiresAt: String
  status: String!
}

input DraftPickInput {
  teamId: String!
  playerId: String!
  roundNumber: Int!
  pickNumber: Int!
  leagueId: String!
}

input DraftOrderInput {
  teamId: String!
  order: Int!
}

input StartDraftInput {
  leagueId: String!
  draftOrder: [DraftOrderInput!]
}

type DraftOrderEntry {
  teamId: String!
  order: Int!
}

type DraftStartResult {
  leagueId: String!
  currentTeamId: String!
  currentRound: Int!
  currentPick: Int!
  pickExpiresAt: String!
  draftOrder: [DraftOrderEntry!]!
}

type Query {
  getDraftPicks(leagueId: String!): [DraftPick!]!
  getDraftState(leagueId: String!): DraftState!
}

type Mutation {
  postDraftPick(input: DraftPickInput!): DraftPickResult!
  startDraft(input: StartDraftInput!): DraftStartResult!
}

type Subscription {
  onDraftPick(leagueId: String!): DraftPickResult
    @aws_subscribe(mutations: ["postDraftPick"])
  onDraftStart(leagueId: String!): DraftStartResult
    @aws_subscribe(mutations: ["startDraft"])
}
