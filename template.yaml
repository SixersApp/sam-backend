          - !Ref PrivateSubnetTwoId
          - !Ref PrivateSubnetThreeId
          - !Ref PrivateSubnetFourId
      Environment:
        Variables:
          DB_HOST: "{{resolve:secretsmanager:sixers-app/db-creds:SecretString:host}}"
          DB_USER: "{{resolve:secretsmanager:sixers-app/db-creds:SecretString:username}}"
          DB_PASSWORD: "{{resolve:secretsmanager:sixers-app/db-creds:SecretString:password}}"
          DB_PORT: 5432
          DB_NAME: !Ref DbName
      Layers:
        - !Ref RdsCertLayer
        - !Ref SharedUtilsLayer
      CodeUri: tournaments-functions/
      Handler: app.lambdaHandler
      Events:
        GetAllTournaments:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /tournaments
            Method: get
        GetTournament:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /tournaments/{tournamentId}
            Method: get
        GetTournamentSeasons:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /tournaments/{tournamentId}/seasons
            Method: get
    Metadata:
      # Manage esbuild properties
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: true
        External:
          - /opt/nodejs/*
        EntryPoints:
          - app.ts
  # ----------------------------------------------------------
  # Season Functions
  # ----------------------------------------------------------
  SeasonsDataFunction:
