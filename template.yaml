            Method: get
        GetLeagueByJoinCode:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /leagues/join/{joinCode}
            Method: get
        JoinLeagueByJoinCode:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /leagues/join/{joinCode}
            Method: post
        GetDefaultScoringRules:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /leagues/scoring-rules
            Method: get
        GetScoringRules:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /leagues/{leagueId}/scoring-rules
            Method: get
        CreateLeague:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /leagues
            Method: post
        UpdateDraftSettings:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /leagues/{leagueId}/draft-settings
            Method: put
        UpdateScoringRules:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /leagues/{leagueId}/scoring-rules
            Method: put
        SetDraftOrder:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /leagues/{leagueId}/draft-order
            Method: put
        GetPositionRules:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /leagues/{leagueId}/position-rules
            Method: get
    Metadata:
      # Manage esbuild properties
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: true
        External:
          - /opt/nodejs/*
        EntryPoints:
          - app.ts


  # ----------------------------------------------------------
  # Matchup Functions
  # ----------------------------------------------------------

  MatchupDataFunction:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroupId
        SubnetIds:
          - !Ref PrivateSubnetOneId
          - !Ref PrivateSubnetTwoId
          - !Ref PrivateSubnetThreeId
          - !Ref PrivateSubnetFourId
      Environment:
        Variables:
          DB_HOST: "{{resolve:secretsmanager:sixers-app/db-creds:SecretString:host}}"
          DB_USER: "{{resolve:secretsmanager:sixers-app/db-creds:SecretString:username}}"
          DB_PASSWORD: "{{resolve:secretsmanager:sixers-app/db-creds:SecretString:password}}"
          DB_PORT: 5432
          DB_NAME: !Ref DbName
      Layers:
        - !Ref RdsCertLayer
        - !Ref SharedUtilsLayer
      CodeUri: matchup-functions/
      Handler: app.lambdaHandler
      Events:
        GetMatchupById:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /matchups/{matchUpId}
            Method: get
        GetMatchUpFeed:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /matchups/feed
            Method: get
    Metadata:
      # Manage esbuild properties
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: true
        External:
          - /opt/nodejs/*
        EntryPoints:
          - app.ts

  # ----------------------------------------------------------
  # Trade Functions
  # ----------------------------------------------------------
  TradeDataFunction:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroupId
        SubnetIds:
          - !Ref PrivateSubnetOneId
          - !Ref PrivateSubnetTwoId
          - !Ref PrivateSubnetThreeId
          - !Ref PrivateSubnetFourId
      Environment:
        Variables:
          DB_HOST: "{{resolve:secretsmanager:sixers-app/db-creds:SecretString:host}}"
          DB_USER: "{{resolve:secretsmanager:sixers-app/db-creds:SecretString:username}}"
          DB_PASSWORD: "{{resolve:secretsmanager:sixers-app/db-creds:SecretString:password}}"
          DB_PORT: 5432
          DB_NAME: !Ref DbName
      Layers:
        - !Ref RdsCertLayer
        - !Ref SharedUtilsLayer
      CodeUri: trade-functions/
      Handler: app.lambdaHandler
      Events:
        ProposeTrade:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /trades/propose
            Method: post
        GetTradesList:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /trades/list/{teamId}
            Method: get
        AcceptTrade:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /trades/{tradeId}/accept
            Method: post
        DeclineTrade:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /trades/{tradeId}/decline
            Method: patch
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: true
        External:
          - /opt/nodejs/*
        EntryPoints:
          - app.ts