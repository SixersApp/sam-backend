            RestApiId: !Ref MyApi
            Path: /fantasy-team-instance/{id}/all
            Method: get
        SwapSlots:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /fantasy-team-instance/{id}/swap-slots
