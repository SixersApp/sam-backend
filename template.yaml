AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: |
  sam-app
  Sample SAM Template for sam-app

Metadata:
  TemplateConfig:
    x-db-function-properties:
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroupId
        SubnetIds:
          - !Ref PrivateSubnetOneId
          - !Ref PrivateSubnetTwoId
          - !Ref PrivateSubnetThreeId
          - !Ref PrivateSubnetFourId
      Environment:
        Variables:
          DB_HOST: "{{resolve:secretsmanager:sixers-app/db-creds:SecretString:host}}"
          DB_USER: "{{resolve:secretsmanager:sixers-app/db-creds:SecretString:username}}"
          DB_PASSWORD: "{{resolve:secretsmanager:sixers-app/db-creds:SecretString:password}}"
          DB_PORT: 5432
          DB_NAME: !Ref DbName
      Layers:
        - !Ref RdsCertLayer
        - !Ref SharedUtilsLayer
# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    Timeout: 3
  Api:
    # This configures API Gateway to answer the browser's "OPTIONS" check
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
      AllowOrigin: "'*'" # <--- Note the quoting: "'*'"

Parameters:
  CognitoUserPoolArn:
    Type: String
    Description: The ARN of the pre-existing Cognito User Pool
  DbName:
    Type: String
    Description: The database name to connect to
    Default: postgres
  LambdaSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: The Security Group to attach to the Lambda functions
  PrivateSubnetOneId:
    Type: AWS::EC2::Subnet::Id
    Description: A private subnet ID for the lambda
  PrivateSubnetTwoId:
    Type: AWS::EC2::Subnet::Id
    Description: A private subnet ID for the lambda
  PrivateSubnetThreeId:
    Type: AWS::EC2::Subnet::Id
    Description: A private subnet ID for the lambda
  PrivateSubnetFourId:
    Type: AWS::EC2::Subnet::Id
    Description: A private subnet ID for the lambda
Resources:
  RdsCertLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: RdsCertLayer
      ContentUri: layers/certs/
      CompatibleRuntimes:
        - nodejs22.x

  SharedUtilsLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: SharedUtilsLayer
      ContentUri: layers/shared/nodejs/
      CompatibleRuntimes:
        - nodejs22.x
    Metadata:
      BuildMethod: nodejs22.x
      BuildArchitecture: x86_64

  MyApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS,PATCH'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'" # <--- Note the quoting: "'*'"
      Auth:
        Authorizers:
          MyCognitoAuthorizer:
            Type: COGNITO_USER_POOLS
            UserPoolArn: !Ref CognitoUserPoolArn
        DefaultAuthorizer: MyCognitoAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
  
  DraftAPI:
    Type: AWS::Serverless::GraphQLApi
    Properties:
      SchemaUri: draft-functions/schema.graphql
      Auth:
        Type: AMAZON_COGNITO_USER_POOLS
        UserPool:
          UserPoolId: 'us-west-2_4xTIIoc8k'
          AwsRegion: us-west-2
          DefaultAction: ALLOW
        Additional:
          - Type: AWS_IAM
      DataSources:
        Lambda:
          DraftDataSource:
            FunctionArn: !GetAtt DraftFunction.Arn
          DraftSchedulerDataSource:
            FunctionArn: !GetAtt DraftSchedulerFunction.Arn
      Functions:
        getDraftPicksFunction:
          Runtime:
            Name: APPSYNC_JS
            Version: 1.0.0
          DataSource: DraftDataSource
          CodeUri: ./draft-functions/resolvers/getDraftPicks.js
        getDraftStateFunction:
          Runtime:
            Name: APPSYNC_JS
            Version: 1.0.0
          DataSource: DraftDataSource
          CodeUri: ./draft-functions/resolvers/getDraftState.js
        postDraftPickFunction:
          Runtime:
            Name: APPSYNC_JS
            Version: 1.0.0
          DataSource: DraftDataSource
          CodeUri: ./draft-functions/resolvers/postDraftPick.js
        startDraftFunction:
          Runtime:
            Name: APPSYNC_JS
            Version: 1.0.0
          DataSource: DraftDataSource
          CodeUri: ./draft-functions/resolvers/startDraft.js
        autoPickDraftPlayerFunction:
          Runtime:
            Name: APPSYNC_JS
            Version: 1.0.0
          DataSource: DraftDataSource
          CodeUri: ./draft-functions/resolvers/autoPickDraftPlayer.js
        endDraftFunction:
          Runtime:
            Name: APPSYNC_JS
            Version: 1.0.0
          DataSource: DraftDataSource
          CodeUri: ./draft-functions/resolvers/endDraft.js
        schedulePickFunction:
          Runtime:
            Name: APPSYNC_JS
            Version: 1.0.0
          DataSource: DraftSchedulerDataSource
          CodeUri: ./draft-functions/resolvers/schedulePick.js
      Resolvers:
        Query:
          getDraftPicks:
            Runtime:
              Name: APPSYNC_JS
              Version: 1.0.0
            Pipeline:
              - getDraftPicksFunction
          getDraftState:
            Runtime:
              Name: APPSYNC_JS
              Version: 1.0.0
            Pipeline:
              - getDraftStateFunction
        Mutation:
          postDraftPick:
            Runtime:
              Name: APPSYNC_JS
              Version: 1.0.0
            Pipeline:
              - postDraftPickFunction
              - schedulePickFunction
          startDraft:
            Runtime:
              Name: APPSYNC_JS
              Version: 1.0.0
            Pipeline:
              - startDraftFunction
              - schedulePickFunction
          autoPickDraftPlayer:
            Runtime:
              Name: APPSYNC_JS
              Version: 1.0.0
            Pipeline:
              - autoPickDraftPlayerFunction
              - schedulePickFunction
          endDraft:
            Runtime:
              Name: APPSYNC_JS
              Version: 1.0.0
            Pipeline:
              - endDraftFunction

  # ----------------------------------------------------------
  # Draft Functions
  # ----------------------------------------------------------
  DraftFunction:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      Timeout: 15
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroupId
        SubnetIds:
          - !Ref PrivateSubnetOneId
          - !Ref PrivateSubnetTwoId
          - !Ref PrivateSubnetThreeId
          - !Ref PrivateSubnetFourId
      Environment:
        Variables:
          DB_HOST: '{{resolve:secretsmanager:sixers-app/db-creds:SecretString:host}}'
          DB_USER: '{{resolve:secretsmanager:sixers-app/db-creds:SecretString:username}}'
          DB_PASSWORD: '{{resolve:secretsmanager:sixers-app/db-creds:SecretString:password}}'
          DB_PORT: 5432
          DB_NAME: !Ref DbName
      Layers:
        - !Ref RdsCertLayer
        - !Ref SharedUtilsLayer
      CodeUri: draft-functions/
      Handler: app.lambdaHandler
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: true
        External:
          - /opt/nodejs/*
          - '@aws-sdk/*'
        EntryPoints:
          - app.ts

  # ----------------------------------------------------------
  # SQS Queue for delayed autopick messages (non-VPC, no endpoint needed)
  # ----------------------------------------------------------
  AutoPickQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: autopick-queue
      VisibilityTimeout: 30

  # ----------------------------------------------------------
  # AutoPick Invoker Function (triggered by SQS)
  # ----------------------------------------------------------
  AutoPickInvokerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      Timeout: 15
      Environment:
        Variables:
          APPSYNC_ENDPOINT: !GetAtt DraftAPI.GraphQLUrl
      CodeUri: autopick-invoker/
      Handler: app.lambdaHandler
      Events:
        AutoPickSQS:
          Type: SQS
          Properties:
            Queue: !GetAtt AutoPickQueue.Arn
            BatchSize: 1
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - appsync:GraphQL
              Resource:
                - !Sub '${DraftAPI.Arn}/types/Mutation/fields/autoPickDraftPlayer'
                - !Sub '${DraftAPI.Arn}/types/Mutation/fields/endDraft'
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: true
        External:
          - '@aws-sdk/*'
        EntryPoints:
          - app.ts

  # ----------------------------------------------------------
  # Draft Scheduler Function (non-VPC, sends delayed SQS messages)
  # ----------------------------------------------------------
  DraftSchedulerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      Timeout: 15
      Environment:
        Variables:
          AUTOPICK_QUEUE_URL: !Ref AutoPickQueue
      CodeUri: draft-scheduler-function/
      Handler: app.lambdaHandler
      Policies:
        - SQSSendMessagePolicy:
            QueueName: !GetAtt AutoPickQueue.QueueName
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: true
        External:
          - '@aws-sdk/*'
        EntryPoints:
          - app.ts

  DraftRestFunction:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroupId
        SubnetIds:
          - !Ref PrivateSubnetOneId
          - !Ref PrivateSubnetTwoId
          - !Ref PrivateSubnetThreeId
          - !Ref PrivateSubnetFourId
      Environment:
        Variables:
          DB_HOST: "{{resolve:secretsmanager:sixers-app/db-creds:SecretString:host}}"
          DB_USER: "{{resolve:secretsmanager:sixers-app/db-creds:SecretString:username}}"
          DB_PASSWORD: "{{resolve:secretsmanager:sixers-app/db-creds:SecretString:password}}"
          DB_PORT: 5432
          DB_NAME: !Ref DbName
      Layers:
        - !Ref RdsCertLayer
        - !Ref SharedUtilsLayer
      CodeUri: draft-functions/
      Handler: rest-app.lambdaHandler
      Events:
        GetDraftPlayers:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /draft/players
            Method: get
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: true
        External:
          - /opt/nodejs/*
        EntryPoints:
          - rest-app.ts

  MatchScoringFunction:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroupId
        SubnetIds:
          - !Ref PrivateSubnetOneId
          - !Ref PrivateSubnetTwoId
          - !Ref PrivateSubnetThreeId
          - !Ref PrivateSubnetFourId
      Environment:
        Variables:
          DB_HOST: "{{resolve:secretsmanager:sixers-app/db-creds:SecretString:host}}"
          DB_USER: "{{resolve:secretsmanager:sixers-app/db-creds:SecretString:username}}"
          DB_PASSWORD: "{{resolve:secretsmanager:sixers-app/db-creds:SecretString:password}}"
          DB_PORT: 5432
          DB_NAME: !Ref DbName
      Layers:
        - !Ref RdsCertLayer
        - !Ref SharedUtilsLayer
      CodeUri: match-scoring-functions/
      Handler: app.lambdaHandler
      Events:
        CreateMatch:
          Type: Api # More info about API Event Source: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#api
          Properties:
            RestApiId: !Ref MyApi
            Path: /scoring/createMatch
            Method: post
        StartMatchScoring:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /scoring/{matchId}/startScoring
            Method: patch
        AddEvent:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /scoring/{matchId}/addEvent
            Method: post
    Metadata:
      # Manage esbuild properties
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: true
        External:
          - /opt/nodejs/*
        EntryPoints:
          - app.ts

  # ----------------------------------------------------------
  # User Functions
  # ----------------------------------------------------------

  UserDataFunction:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroupId
        SubnetIds:
          - !Ref PrivateSubnetOneId
          - !Ref PrivateSubnetTwoId
          - !Ref PrivateSubnetThreeId
          - !Ref PrivateSubnetFourId
      Environment:
        Variables:
          DB_HOST: "{{resolve:secretsmanager:sixers-app/db-creds:SecretString:host}}"
          DB_USER: "{{resolve:secretsmanager:sixers-app/db-creds:SecretString:username}}"
          DB_PASSWORD: "{{resolve:secretsmanager:sixers-app/db-creds:SecretString:password}}"
          DB_PORT: 5432
          DB_NAME: !Ref DbName
      Layers:
        - !Ref RdsCertLayer
        - !Ref SharedUtilsLayer
      CodeUri: users-functions/
      Handler: app.lambdaHandler
      Events:
        CreateUser:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /users/auth/signup
            Method: put
        GetUserProfile:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /users/profile
            Method: get
        UpdateUserProfile:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /users/profile
            Method: patch
    Metadata:
      # Manage esbuild properties
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: true
        External:
          - /opt/nodejs/*
        EntryPoints:
          - app.ts
